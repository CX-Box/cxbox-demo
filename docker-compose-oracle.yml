version: '2.1'

services:
  oracle:
    image: gvenzl/oracle-xe:latest
    environment:
      - ORACLE_PASSWORD=PASSWORD
      - APP_USER=app
      - APP_USER_PASSWORD=app
      - COMMENT=use with DATABASE_DRIVER=oracle.jdbc.driver.OracleDriver;DATABASE_PASSWORD=app;DATABASE_URL=jdbc:oracle:thin:@localhost:1523/XEPDB1;DATABASE_USER=app
    ports:
      - "1523:1521"
      - "5501:5500"
    expose:
      -  1521
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    environment:
      KC_DB: dev-file
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 9080
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: "xforwarded"
      KC_LOG_LEVEL: INFO
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      COMMENT: "If you get error `HTTPS required` on MacOS. FIX: In Docker Desktop network configuration: Settings → Resources → Network → Port binding behavior  set to: 'Localhost by default' (https://github.com/quarkusio/quarkus/discussions/48905)"
    command: start-dev --import-realm --features=scripts
    volumes:
      - ./docker/keycloak-config:/opt/keycloak/data/import/
      - ./.tmp/keycloak-db:/opt/keycloak/data/h2
    ports:
      - "9080:9080"
      - "9443:9443"
  cxbox_minio:
    image: bitnamilegacy/minio:2022.2.12
    expose:
      - 9000
      - 9001
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "4eb6a7db8b58994ea61b"
      MINIO_ROOT_PASSWORD: "prCv8t9LGRH18FB5pLr5jqDZ/dixZkb9cFajueGW"
      MINIO_DEFAULT_BUCKETS: "edcs3gnsadevb"

networks:
  dbbr-local-network:
    driver: bridge